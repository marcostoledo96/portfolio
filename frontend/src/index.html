<!doctype html>
<!-- Punto de entrada HTML del portfolio. class="dark" en <html> establece el tema oscuro inicial y evita el flash de tema claro al cargar; TemaService lo gestiona en runtime. -->
<html lang="es" class="dark">

<head>
    <meta charset="utf-8">
    <title>Marcos Ezequiel Toledo — Desarrollador de Software &amp; QA Tester</title>
    <!-- El router de Angular requiere base href="/" para resolver rutas absolutas correctamente -->
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Portfolio de Marcos Ezequiel Toledo, Desarrollador Full Stack Jr. y QA Tester. Proyectos con Angular, React, Node.js, TypeScript y más. Buenos Aires, Argentina.">
    <link rel="icon" type="image/x-icon" href="assets/img/mt.ico">
    <!-- Canonical: URL canónica para que los crawlers identifiquen la versión principal del sitio -->
    <link rel="canonical" href="https://www.marcostoledo.cv">
    <!-- Open Graph: tags estáticos para crawlers que no ejecutan JavaScript -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Marcos Ezequiel Toledo — Desarrollador de Software &amp; QA Tester">
    <meta property="og:description" content="Portfolio de Marcos Ezequiel Toledo, Desarrollador Full Stack Jr. y QA Tester. Proyectos con Angular, React, Node.js, TypeScript y más. Buenos Aires, Argentina.">
    <meta property="og:image" content="https://www.marcostoledo.cv/assets/img/og-preview.png">
    <meta property="og:url" content="https://www.marcostoledo.cv">
    <meta property="og:locale" content="es_AR">
    <!-- Twitter Card: tags estáticos para previews en redes sociales -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Marcos Ezequiel Toledo — Desarrollador de Software &amp; QA Tester">
    <meta name="twitter:description" content="Portfolio de Marcos Ezequiel Toledo, Desarrollador Full Stack Jr. y QA Tester. Proyectos con Angular, React, Node.js, TypeScript y más. Buenos Aires, Argentina.">
    <meta name="twitter:image" content="https://www.marcostoledo.cv/assets/img/og-preview.png">
    <!-- JSON-LD: datos estructurados para que Google muestre rich snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Marcos Ezequiel Toledo",
      "jobTitle": "Desarrollador de Software & QA Tester",
      "url": "https://www.marcostoledo.cv",
      "sameAs": [
        "https://github.com/marcostoledo96",
        "https://www.linkedin.com/in/marcos-ezequiel-toledo"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Buenos Aires",
        "addressCountry": "AR"
      }
    }
    </script>
    <!-- preconnect establece la conexión TLS con Google Fonts de forma anticipada para reducir latencia -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Inter para texto general; Fira Code para etiquetas de tecnología y fragmentos de código -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons — versión fija para cache estable y menor tamaño de payload; inicializado en ngAfterViewInit de cada componente -->
    <script defer src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <!-- Cloudflare Turnstile CAPTCHA — carga async, render=explicit para control manual desde el componente -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <!-- Google Analytics 4 — Descomentar cuando se tenga un measurement ID real
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX');
    </script>
    -->
</head>

<body>
    <!-- Angular monta AppComponent aquí; todo el árbol de componentes vive dentro de este elemento -->
    <app-root></app-root>
</body>

</html>
