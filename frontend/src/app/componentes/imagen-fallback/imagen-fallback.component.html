<!-- Imagen normal — se oculta si hay error de carga -->
@if (!hasError()) {
  <img
    [src]="src"
    [alt]="alt"
    [class]="className"
    [style]="sizeStyle"
    [loading]="loading"
    [attr.width]="width ?? null"
    [attr.height]="height ?? null"
    (error)="onError()"
  />
}

<!-- Fallback — visible solo cuando la imagen falló -->
@if (hasError()) {
  <div class="img-fallback" [style]="sizeStyle" [class]="className" [attr.aria-label]="alt || 'Imagen no disponible'">
    <!-- Ícono de imagen rota (SVG inline, 24×24) -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="img-fallback__icon"
      aria-hidden="true"
    >
      <!-- Marco exterior de la imagen -->
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
      <!-- Montaña pequeña / paisaje -->
      <circle cx="8.5" cy="8.5" r="1.5" />
      <polyline points="21,15 16,10 5,21" />
      <!-- Línea diagonal de "roto" -->
      <line x1="3" y1="3" x2="21" y2="21" />
    </svg>
  </div>
}
