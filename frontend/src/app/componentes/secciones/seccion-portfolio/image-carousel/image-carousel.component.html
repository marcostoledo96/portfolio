<!-- Contenedor principal del carousel; las flechas y el zoom aparecen en hover -->
<div class="caro">

  <!-- Imagen activa con animación crossfade al cambiar currentIndex -->
  <img
    [@imgFade]="currentIndex"
    [src]="images[currentIndex]"
    [alt]="title"
    class="caro__img"
    draggable="false"
  />

  <!-- Gradiente oscuro en la parte inferior para mejorar la legibilidad de los controles -->
  <div class="caro__gradient"></div>

  <!-- Botón de zoom — top-left, visible en hover del contenedor -->
  <button class="caro__zoom-btn" (click)="onZoom($event)" [attr.aria-label]="'Ampliar imagen ' + title" type="button">
    <i data-lucide="zoom-in" class="caro__zoom-icon"></i>
  </button>

  <!-- Controles de navegación y contador; solo cuando hay más de una imagen -->
  @if (images.length > 1) {
    <!-- Flecha anterior — centrada verticalmente a la izquierda -->
    <button class="caro__arrow caro__arrow--prev" (click)="prev($event)" aria-label="Imagen anterior" type="button">
      <i data-lucide="chevron-left" class="caro__arrow-icon"></i>
    </button>

    <!-- Flecha siguiente — centrada verticalmente a la derecha -->
    <button class="caro__arrow caro__arrow--next" (click)="next($event)" aria-label="Imagen siguiente" type="button">
      <i data-lucide="chevron-right" class="caro__arrow-icon"></i>
    </button>

    <!-- Counter badge "1 / 3" — top-right, a la izquierda del botón zoom -->
    <span class="caro__counter">{{ currentIndex + 1 }} / {{ images.length }}</span>

    <!-- Puntos indicadores — bottom-center -->
    <div class="caro__dots">
      @for (img of images; track $index) {
        <button
          class="caro__dot"
          [class.caro__dot--active]="$index === currentIndex"
          (click)="goTo($index); $event.stopPropagation()"
          [attr.aria-label]="'Ir a imagen ' + ($index + 1)"
          type="button"
        ></button>
      }
    </div>
  }

</div>
